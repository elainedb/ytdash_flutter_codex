name: ytdash_flutter_codex
description: Flutter YouTube dashboard app with Google Sign-In.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.3.0
  get_it: ^8.0.3
  dartz: ^0.10.1
  equatable: ^2.0.7
  http: ^1.4.0
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  sqflite: ^2.4.2
  path: ^1.9.1
  geocoding: ^3.0.0
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
