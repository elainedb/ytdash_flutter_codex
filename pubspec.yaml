name: ytdash_flutter_codex
description: Flutter app for authenticated YouTube channel dashboards.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.3.6
  google_sign_in: ^6.2.2
  flutter_bloc: ^9.0.0
  bloc_concurrency: ^0.3.0
  get_it: ^8.0.3
  injectable: ^2.5.0
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  http: ^1.3.0
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  sqflite: ^2.4.1
  path: ^1.9.1
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
